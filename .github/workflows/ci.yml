name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: careos
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -ppassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: careos
      DB_USERNAME: root
      DB_PASSWORD: password
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      REDIS_CLIENT: predis
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_mysql, mbstring, openssl, tokenizer, ctype, json, curl, fileinfo, bcmath, pcntl, posix
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Test nurse PWA
        run: npm run test:pwa

      - name: Build nurse PWA
        run: npm run build:pwa

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -uroot -ppassword --silent; then
              echo "MySQL is up"; break
            fi
            echo "Waiting for MySQL..."; sleep 2
          done

      - name: Run migrations
        run: php artisan migrate --force

      # P0P.G15 parity gate: the service DB is a CLEAN MySQL 8 schema, so this
      # step proves the COMPLETE migration set applies from scratch on the
      # production engine with zero errors and zero pending migrations.
      - name: Assert zero pending migrations (MySQL 8 from-scratch parity)
        run: |
          php artisan migrate:status --no-interaction | tee migrate-status.txt
          if grep -q "Pending" migrate-status.txt; then
            echo "::error::Pending migrations remain after migrate on MySQL 8"; exit 1
          fi

      - name: Quality checks (lint, analyse, test)
        run: composer check
